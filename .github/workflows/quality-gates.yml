name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend
        run: dotnet restore backend/SassyGurl.Api/SassyGurl.Api.csproj

      - name: Build backend
        run: dotnet build backend/SassyGurl.Api/SassyGurl.Api.csproj --no-restore -c Release

      - name: Run backend tests
        run: dotnet test backend/SassyGurl.Api.Tests/SassyGurl.Api.Tests.csproj -c Release --no-build --verbosity normal

  policy-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block legacy app API usage
        run: |
          if git grep -n 'fetch("/api/' -- 'app/**/*.ts' 'app/**/*.tsx'; then
            echo "Legacy fetch('/api/...') found in app/. Please migrate to server actions/api client."
            exit 1
          fi

      - name: Block obvious hardcoded secrets in appsettings.json
        run: |
          if git grep -n 'Password=' -- backend/SassyGurl.Api/appsettings.json; then
            echo "Detected hardcoded DB password in appsettings.json"
            exit 1
          fi
          if git grep -n '"Key": "SassyGurlStore_' -- backend/SassyGurl.Api/appsettings.json; then
            echo "Detected hardcoded JWT key in appsettings.json"
            exit 1
          fi
